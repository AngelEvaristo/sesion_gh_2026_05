name: Pr build 

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: 
        run: echo "Version es ${{ needs.extract-version.outputs.app_version }}"

      - name: checkout repo
        uses: actions/checkout@v4

      - name: Install dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: test LS
        run: ls     

      - name: Restore 
        run: dotnet restore

      - name: Build 
        run: dotnet build --no-restore --configuration Release